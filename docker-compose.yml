services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  webhooks:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-whsec_dev_secret}
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
